<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VEYKU - Tentukan Jurusan Kuliahmu{% endblock %}</title>
    <!-- Tambahan Favicon -->
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='foto/logo.svg') }}">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/survey.css') }}">
    <style>
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body class="{% block body_class %}{% endblock %}">
    <script>
        // Set tema awal sebelum halaman dirender untuk mencegah flash of unstyled content
        const savedTheme = localStorage.getItem('veyku-theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>

    <nav class="navbar">
        <a href="{{ url_for('survey.landing') }}" class="navbar-brand" style="display: flex; align-items: center; gap: 8px;">
            <img src="{{ url_for('static', filename='foto/logo.svg') }}" alt="Veyku Logo" width="28" height="28">
            VEYKU
        </a>
        <div class="navbar-nav">
            <a href="{{ url_for('survey.landing') }}" class="nav-link">Survey</a>
            <!-- Link ke halaman about nanti -->
            <a href="{{ url_for('survey.about') }}" class="nav-link">About</a>
            <button id="theme-toggle" class="nav-icon theme-btn" aria-label="Toggle Dark Mode">
                <!-- Ikon Moon (Default/Light Mode) -->
                <svg id="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
                </svg>
                <!-- Ikon Sun (Dark Mode) -->
                <svg id="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="display:none;">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
            </button>
            <a href="{{ url_for('auth.login') }}" class="nav-icon" title="Login Admin">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </a>
        </div>
    </nav>

    <div class="flash-messages">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
    </div>

    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Script Global untuk Interaktivitas UI -->
    <script>
        // Efek Navbar Glassmorphism saat scroll
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 20) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // Dark Mode Logic
        const themeToggle = document.getElementById('theme-toggle');
        const iconMoon = document.getElementById('theme-icon-moon');
        const iconSun = document.getElementById('theme-icon-sun');

        function updateThemeIcon() {
            if (document.documentElement.getAttribute('data-theme') === 'dark') {
                iconMoon.style.display = 'none';
                iconSun.style.display = 'block';
            } else {
                iconMoon.style.display = 'block';
                iconSun.style.display = 'none';
            }
        }

        updateThemeIcon(); // Panggil saat awal load

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const targetTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', targetTheme);
            localStorage.setItem('veyku-theme', targetTheme);
            updateThemeIcon();
        });

        // Efek Animasi saat Scroll (Intersection Observer)
        document.addEventListener('DOMContentLoaded', () => {
            // Auto-hide Flash Messages (Pop up)
            const alerts = document.querySelectorAll('.alert');
            if(alerts.length > 0) {
                setTimeout(() => {
                    alerts.forEach(alert => {
                        alert.style.transition = 'all 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
                        alert.style.opacity = '0';
                        alert.style.translate = '0 -20px';
                        setTimeout(() => alert.remove(), 500); // Hapus elemen dari DOM setelah animasi
                    });
                }, 3500); // Pop up tampil selama 3.5 detik
            }

            const observerOptions = {
                root: null,
                rootMargin: '0px',
                threshold: 0.15 // Animasi mulai saat elemen 15% terlihat
            };

            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                        observer.unobserve(entry.target); // Animasi hanya berjalan sekali
                    }
                });
            }, observerOptions);

            const revealElements = document.querySelectorAll('.reveal-on-scroll');
            revealElements.forEach(el => observer.observe(el));
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
