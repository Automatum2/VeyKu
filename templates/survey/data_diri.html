{% extends "layout/base_survey.html" %}

{% block title %}VEYKU - Future Path{% endblock %}

{% block extra_css %}
/* CSS sudah dipindahkan ke static/css/survey.css */
{% endblock %}

{% block content %}
<div class="register-container fade-in-scale">
    <h1 class="register-title">Pendaftaran</h1>
    <p class="register-subtitle">Lengkapi data diri kamu sebelum memulai tes.</p>

    <form method="POST" action="{{ url_for('survey.data_diri') }}">
        <div class="form-group-minimal">
            <label class="form-label-minimal">NIS (NOMOR INDUK SISWA)</label>
            <input type="text" name="nis" class="form-control-underline" placeholder="Masukkan NIS kamu" required>
        </div>

        <div class="form-group-minimal">
            <label class="form-label-minimal">NAMA LENGKAP</label>
            <input type="text" name="nama" class="form-control-underline" placeholder="Masukkan nama lengkap kamu" required>
        </div>
        
        <div class="form-group-minimal">
            <label class="form-label-minimal">JURUSAN DI SMK 1 DENPASAR</label>
            <select name="jurusan_smk" class="form-control-underline" required style="cursor: pointer;">
                <option value="" disabled selected>-- Pilih Jurusan Kamu --</option>
                <option value="DPIB">DPIB (Desain Pemodelan & Info. Bangunan)</option>
                <option value="TKP">TKP (Teknik Konstruksi Perumahan)</option>
                <option value="TPM">TPM (Teknik Pemesinan)</option>
                <option value="TKR">TKR (Teknik Kendaraan Ringan)</option>
                <option value="TSM">TSM (Teknik Sepeda Motor)</option>
                <option value="TPTUP">TPTUP (Teknik Pendingin & Tata Udara)</option>
                <option value="TITL">TITL (Teknik Instalasi Tenaga Listrik)</option>
                <option value="TAV">TAV (Teknik Audio Video)</option>
                <option value="TKJ">TKJ (Teknik Komputer & Jaringan)</option>
                <option value="RPL">RPL (Rekayasa Perangkat Lunak)</option>
                <option value="DKV">DKV (Desain Komunikasi Visual)</option>
                <option value="PRF">PRF (Produksi Film)</option>
            </select>
        </div>
        
        <div class="form-group-minimal">
            <label class="form-label-minimal">EMAIL</label>
            <input type="email" name="email" class="form-control-underline" placeholder="Alamat email aktif" required>
        </div>
        
        <div class="form-group-minimal">
            <label class="form-label-minimal">NOMOR WHATSAPP</label>
            <input type="text" name="no_wa" class="form-control-underline" placeholder="Contoh: 08123456789" required>
        </div>
        
        <button type="submit" class="btn-primary btn-submit-wide">Mulai Tes</button>
    </form>
</div>
{% endblock %}
