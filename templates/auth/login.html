{% extends "layout/base_survey.html" %}
{% block title %}Login Admin{% endblock %}

{% block content %}
<div class="form-page">
    <div class="glass-card form-card fade-in-up" style="max-width: 440px;">
        <div class="text-center" style="margin-bottom: var(--space-2xl);">
            <div style="font-size: 2.5rem; margin-bottom: var(--space-md);">🔐</div>
            <h1 style="font-size: 1.5rem;">Login Admin</h1>
            <p class="text-muted">Dashboard Rekomendasi Karier SMK 1 Denpasar</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" class="form-input" id="email" name="email" 
                       placeholder="admin@smk1denpasar.sch.id" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" class="form-input" id="password" name="password" 
                       placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
                Masuk →
            </button>
        </form>

        <p class="form-note" style="margin-top: var(--space-xl);">
            <a href="{{ url_for('survey.landing') }}">← Kembali ke halaman tes</a>
        </p>
    </div>
</div>
{% endblock %}
