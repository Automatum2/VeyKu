{% extends "layout/base_survey.html" %}
{% block title %}Login Admin{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="glass-card form-card fade-in-up login-card">
        <div class="login-header">
            <img src="{{ url_for('static', filename='foto/logo.svg') }}" alt="Logo Veyku" class="login-logo">
            
            <h1 class="login-title">Login Admin</h1>
            <p class="text-muted login-subtitle">Dashboard Rekomendasi Karier SMK 1 Denpasar</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group" style="margin-bottom: 20px;">
                <label class="form-label-bold" for="email">Email</label>
                <input type="email" class="form-input input-full" id="email" name="email" 
                       placeholder="admin@smk1denpasar.sch.id" required>
            </div>
            <div class="form-group" style="margin-bottom: 25px;">
                <label class="form-label-bold" for="password">Password</label>
                <input type="password" class="form-input input-full" id="password" name="password" 
                       placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg btn-login">
                Masuk →
            </button>
        </form>

        <div class="footer-link">
            <a href="{{ url_for('survey.landing') }}" class="text-muted" style="text-decoration: none; font-weight: 600; font-size: 0.95rem;">
                ← Kembali ke Beranda
            </a>
        </div>
    </div>
</div>
{% endblock %}
