{% extends "layout/base_survey.html" %}
{% block title %}Login Admin{% endblock %}

{% block content %}
<div class="form-page" style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div class="glass-card form-card fade-in-up" style="width: 100%; max-width: 440px; padding: 40px 30px; border-radius: 20px; box-sizing: border-box;">
        <div class="text-center" style="margin-bottom: 30px;">
            <div style="font-size: 2.5rem; margin-bottom: 15px;">🔐</div>
            <h1 style="font-size: 1.8rem; margin-bottom: 8px;">Login Admin</h1>
            <p class="text-muted" style="font-size: 0.95rem; margin-bottom: 0;">Dashboard Rekomendasi Karier SMK 1 Denpasar</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group" style="margin-bottom: 20px;">
                <label class="form-label" for="email" style="display: block; margin-bottom: 8px; font-weight: 600;">Email</label>
                <input type="email" class="form-input" id="email" name="email" 
                       placeholder="admin@smk1denpasar.sch.id" required style="width: 100%; box-sizing: border-box; padding: 12px 15px;">
            </div>
            <div class="form-group" style="margin-bottom: 25px;">
                <label class="form-label" for="password" style="display: block; margin-bottom: 8px; font-weight: 600;">Password</label>
                <input type="password" class="form-input" id="password" name="password" 
                       placeholder="Masukkan password" required style="width: 100%; box-sizing: border-box; padding: 12px 15px;">
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; padding: 14px; font-size: 1.1rem; border-radius: 10px;">
                Masuk →
            </button>
        </form>

        <div style="margin-top: 30px; text-align: center;">
            <a href="{{ url_for('survey.landing') }}" style="color: var(--text-muted); text-decoration: none; font-weight: 600; font-size: 0.95rem;">← Kembali ke Beranda</a>
        </div>
    </div>
</div>
{% endblock %}
